format = "$username$directory$all$cmd_duration$line_break$character"

[username]
format     = "[$user]($style) "
style_root = "bold fg:#8bd6b6"
style_user = "bold fg:#8bd6b6"

[directory]
style           = "bold fg:#b3ccbf"
read_only_style = "bold fg:#b3ccbf"
fish_style_pwd_dir_length = 1

[git_branch]
format = "[\\($branch(:$remote_branch)\\)]($style) "
style  = "bold #a6cce0"
